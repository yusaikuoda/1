      <stop stop-color="#0b1412"/>
      <stop offset="1" stop-color="#1a554d"/>
    </linearGradient>
    <pattern id="p" width="90" height="90" patternUnits="userSpaceOnUse">
      <path d="M90 0H0v90" fill="none" stroke="#ffffff" stroke-opacity=".12"/>

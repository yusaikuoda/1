  <path d="M230 610 370 530 520 470 650 498 785 505 910 520 1010 570 1130 535 1220 470 1360 435 1480 355 1585 310 1690 345" fill="none" stroke="#2abf96" stroke-width="12" stroke-opacity=".8"/>
  <g fill="#e8efeb" opacity=".78">
    <circle cx="230" cy="610" r="9"/>
    <circle cx="520" cy="470" r="9"/>
    <circle cx="1010" cy="570" r="9"/>
    <circle cx="1360" cy="435" r="9"/>
    <circle cx="1690" cy="345" r="9"/>
